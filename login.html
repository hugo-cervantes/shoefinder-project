<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    /* Copy the CSS styles from questionnaire.html */
    .header {
      background-color: #1f2937;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      margin: 0;
    }
    .header p {
      font-size: 16px;
      margin: 0;
    }
    /* Add any additional styles for the login page */
    form {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
    .centered-button {
      display: block;
      margin: 0 auto;
      background-color: #0074D9;
      color: #fff;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    .centered-button:hover {
      background-color: #005EA2;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Login Page</h1>
    <p>Find the perfect shoes for your feet</p>
  </header>

  <form>
    <input type="text" placeholder="Email" id="email">
    <input type="password" placeholder="Password" id="password">
    <button class="centered-button" onclick="redirectToHomePage()">Login</button>
  </form>

  <script>
    function redirectToHomePage() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
