<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoleMate - Finding Perfect Shoes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(145deg,#e9eff7 0%,#f6f7fb 55%,#fcf9f3 100%);
  min-height:100vh;
  margin:0;
  padding:0;
  color:#1f2937;
}
.container{
  background:rgba(255,255,255,0.96);
  border-radius:0;
  box-shadow:none;
  width:100%;
  min-height:100vh;
}
.header{
  background:#1f2937;
  color:white;
  padding:20px 60px 18px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  flex-wrap:nowrap;
}
.home-link{
  display:inline-flex;
  flex-direction:column;
  text-decoration:none;
  color:inherit;
  background:transparent;
  border:none;
  padding:0;
  cursor:pointer;
}
.home-link:hover .header-title,
.home-link:focus .header-title{ opacity:0.94; }
.home-link:hover .header-subtitle,
.home-link:focus .header-subtitle{ opacity:0.88; }
.header h1{font-size:3rem;margin-bottom:2px;}
.header p{color:#cbd5e1;margin-top:2px;font-size:1rem;}
.content{padding:40px 60px 80px;max-width:1200px;margin:0 auto;}
.screen{display:none;}
.screen.active{display:block;}
.btn{
  padding:12px 26px;
  background:linear-gradient(135deg,#5f7dff 0%,#6b4fc6 100%);
  color:white;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  margin:5px;
  min-height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 12px 24px rgba(102,126,234,0.18);
  transition:transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
  text-decoration:none;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 18px 32px rgba(102,126,234,0.24);opacity:0.98;}
.btn-secondary{
  background:rgba(255,255,255,0.16);
  color:white;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:none;
}
.btn-secondary:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 32px rgba(255,255,255,0.14);
}
.top-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  flex-wrap:nowrap;
  flex:1;
}
.left-buttons,.right-buttons{
  display:flex;
  align-items:center;
  gap:12px;
}
.search-input{
  flex:1;
  min-width:220px;
  max-width:420px;
  height:44px;
  padding:0 14px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,0.4);
  background:white;
  color:#0f172a;
  transition:box-shadow 0.2s ease,border-color 0.2s ease;
}
.search-input:focus{
  outline:none;
  border-color:#5f7dff;
  box-shadow:0 0 0 4px rgba(95,125,255,0.12);
}
.filter-toggle{ margin-top:4px; }
.filter-panel{
  display:none;
  background:#f8f9ff;
  padding:24px;
  border-radius:18px;
  margin-bottom:20px;
  border:1px solid rgba(101,126,234,0.18);
}
.filter-panel.show{display:block;}
.filter-panel label{
  display:block;
  font-weight:600;
  margin-bottom:10px;
  color:#334155;
}
.filter-panel select{
  width:100%;
  margin-top:8px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,0.35);
  background:white;
  font-size:0.98rem;
  color:#0f172a;
  transition:box-shadow 0.2s ease,border-color 0.2s ease;
}
.filter-panel select:focus{
  outline:none;
  border-color:#5f7dff;
  box-shadow:0 0 0 4px rgba(95,125,255,0.12);
}
.shoes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.shoe-card{
  border:2px solid rgba(148,163,184,0.28);
  border-radius:16px;
  padding:18px;
  background:white;
  transition:transform 0.3s ease,box-shadow 0.3s ease,border-color 0.3s ease;
}
.shoe-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 35px rgba(15,23,42,0.12);
  border-color:#667eea;
}
.shoe-image img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:16px;
}
.shoe-name{font-weight:600;margin:14px 0 8px;}
.shoe-price{font-weight:700;color:#6b4fc6;}
.size-input-group{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
  flex-wrap:wrap;
}
.size-number-input{
  width:90px;
  height:36px;
  padding:0 10px;
  border:2px solid #e0e0e0;
  border-radius:8px;
  font-size:0.95em;
  outline:none;
  transition:border-color 0.2s;
}
.size-number-input:focus{border-color:#667eea;}
.size-unit-toggle{
  display:flex;
  border:2px solid #e0e0e0;
  border-radius:8px;
  overflow:hidden;
}
.size-unit-toggle button{
  padding:4px 12px;
  border:none;
  background:white;
  cursor:pointer;
  font-size:0.85em;
  font-weight:600;
  color:#666;
  transition:background 0.2s,color 0.2s;
}
.size-unit-toggle button.active{
  background:#667eea;
  color:white;
}
.size-hint{
  font-size:0.78em;
  color:#888;
  margin-top:4px;
}
#sortPanel{ background:white; }
#sortPanel .option{
  padding:10px 15px;
  border:2px solid #e0e0e0;
  border-radius:8px;
  cursor:pointer;
  background:white;
  color:black;
  margin-bottom:6px;
}
#sortPanel .option.selected{
  background:white;
  color:black !important;
  border-color:#e0e0e0;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <a href="index.html" class="home-link">
    <h1 class="header-title">SoleMate</h1>
    <p class="header-subtitle">Find the perfect shoes for your feet</p>
  </a>
  <div class="top-controls">
    <div class="left-buttons">
      <button class="btn filter-toggle" onclick="toggleFilters()">Filter</button>
      <div style="position:relative;">
        <button class="btn sort-btn" onclick="toggleSort()">Sort by</button>
        <div id="sortPanel" class="filter-panel" style="position:absolute;top:100%;left:0;display:none;min-width:160px;z-index:1000;">
          <div class="option" onclick="setSort('alpha-asc')">Alphabetical A→Z</div>
          <div class="option" onclick="setSort('alpha-desc')">Alphabetical Z→A</div>
          <div class="option" onclick="setSort('price-asc')">Price Low→High</div>
          <div class="option" onclick="setSort('price-desc')">Price High→Low</div>
        </div>
      </div>
    </div>
    <input type="text" id="shoeSearch" class="search-input" placeholder="Search shoes..." oninput="displayShoes()">
    <div class="right-buttons">
      <a href="questionnaire.html" class="btn">Personalize Shoes</a>
    </div>
  </div>
  <a href="login.html" class="btn">Login</a>
</div>

<div class="content">
  <div id="catalogScreen" class="screen active">

    <div id="filterPanel" class="filter-panel">
      <label>
        Width:
        <select id="widthFilter" onchange="setFilter('width', this.value)">
          <option value="all">All</option>
          <option value="narrow">Narrow</option>
          <option value="medium">Medium</option>
          <option value="wide">Wide</option>
          <option value="extra-wide">Extra Wide</option>
        </select>
      </label>
      <label style="margin-top:10px;display:block;">
        Activity:
        <select id="activityFilter" onchange="setFilter('activity', this.value)">
          <option value="all">All</option>
          <option value="running">Running</option>
          <option value="casual">Casual</option>
          <option value="hiking">Hiking</option>
          <option value="sports">Sports</option>
        </select>
      </label>
      <label style="margin-top:10px;display:block;">
        Gender:
        <select id="genderFilter" onchange="setFilter('gender', this.value)">
          <option value="all">All</option>
          <option value="men">Men</option>
          <option value="women">Women</option>
        </select>
      </label>
      <div style="margin-top:14px;">
        <label style="font-weight:500;color:#444;font-size:0.95em;display:block;margin-bottom:6px;">Shoe Size:</label>
        <div class="size-input-group">
          <input type="number" class="size-number-input" id="filterSizeInput"
            placeholder="e.g. 10" min="4" max="18" step="0.5"
            oninput="setFilter('size', this.value)">
          <div class="size-unit-toggle">
            <button id="filterUnitUS" class="active" onclick="setFilterUnit('US')">US</button>
            <button id="filterUnitEU" onclick="setFilterUnit('EU')">EU</button>
            <button id="filterUnitUK" onclick="setFilterUnit('UK')">UK</button>
          </div>
          <button onclick="clearFilterSize()" style="background:none;border:1px solid #ccc;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.82em;color:#666;">Clear</button>
        </div>
        <div class="size-hint">Leave blank to show all sizes. Sizes matched within ±0.5.</div>
      </div>
    </div>

    <div id="recommendationBox" style="margin-bottom:20px;"></div>
    <div class="shoes-grid" id="shoesGrid"></div>

  </div>
</div>
</div>

<script>
let shoes = [];
let userPref = { purpose:null, width:null, gender:null, size:null, sizeUnit:'US' };
let filter = { width:'all', activity:'all', gender:'all', size:null, sizeUnit:'US' };
let showUserPref = false;
let currentSort = 'alpha-asc';

// *** THE FIX: all DOM access is inside DOMContentLoaded so elements exist ***
document.addEventListener('DOMContentLoaded', function() {

  const saved = localStorage.getItem('userPref');
  if(saved) {
    try { userPref = JSON.parse(saved); } catch(e) { userPref = {}; }
    localStorage.removeItem('userPref');

    showUserPref = true;

    filter.width    = userPref.width    || 'all';
    filter.activity = userPref.purpose  || 'all';  // questionnaire uses 'purpose'
    filter.gender   = userPref.gender   || 'all';
    filter.size     = userPref.size     || null;
    filter.sizeUnit = userPref.sizeUnit || 'US';

    // DOM is ready now — safe to set values
    document.getElementById('widthFilter').value    = filter.width;
    document.getElementById('activityFilter').value = filter.activity;
    document.getElementById('genderFilter').value   = filter.gender;
    if(filter.size) document.getElementById('filterSizeInput').value = filter.size;
    setFilterUnit(filter.sizeUnit);

    showRecommendation();
  }

  loadShoes();
});

async function loadShoes() {
  try {
    const res = await fetch('nike-shoes.json');
    if(!res.ok) throw new Error('HTTP ' + res.status);
    shoes = await res.json();
    displayShoes();
  } catch(e) {
    console.error('Failed to load shoes:', e);
    document.getElementById('shoesGrid').innerHTML =
      `<p style="color:#e53e3e;grid-column:1/-1;text-align:center;padding:40px 0;">
        Could not load shoes. Make sure nike-shoes.json is in the same folder as this file.
      </p>`;
  }
}

function toggleFilters() {
  document.getElementById('filterPanel').classList.toggle('show');
}

function setFilter(type, value) {
  filter[type] = value || 'all';
  showUserPref = false;
  displayShoes();
}

function setFilterUnit(unit) {
  filter.sizeUnit = unit;
  ['US','EU','UK'].forEach(u => {
    const el = document.getElementById('filterUnit' + u);
    if(el) el.classList.toggle('active', u === unit);
  });
  const val = document.getElementById('filterSizeInput') ? document.getElementById('filterSizeInput').value : '';
  filter.size = val !== '' ? val : null;
  displayShoes();
}

function clearFilterSize() {
  document.getElementById('filterSizeInput').value = '';
  filter.size = null;
  displayShoes();
}

function usToEu(us){ return Math.round((parseFloat(us) + 31.5) * 2) / 2; }
function euToUs(eu){ return Math.round((parseFloat(eu) - 31.5) * 2) / 2; }
function usToUk(us){ return Math.round((parseFloat(us) - 1) * 2) / 2; }
function ukToUs(uk){ return Math.round((parseFloat(uk) + 1) * 2) / 2; }

function toUSSize(value, unit) {
  const v = parseFloat(value);
  if(isNaN(v)) return null;
  if(unit === 'EU') return euToUs(v);
  if(unit === 'UK') return ukToUs(v);
  return v;
}

function showRecommendation() {
  const sizeText = userPref.size
    ? `, size <strong>${userPref.size} ${userPref.sizeUnit || 'US'}</strong>`
    : '';
  document.getElementById('recommendationBox').innerHTML =
    `<p>Based on your choices: <strong>${userPref.purpose}</strong> for <strong>${userPref.width}</strong> (${userPref.gender}${sizeText}), here are your best options:</p>`;
}

function toggleSort() {
  const panel = document.getElementById('sortPanel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function setSort(sortType) {
  currentSort = sortType;
  document.querySelectorAll('#sortPanel .option').forEach(o => o.classList.remove('selected'));
  const target = document.querySelector(`#sortPanel .option[onclick="setSort('${sortType}')"]`);
  if(target) target.classList.add('selected');
  document.getElementById('sortPanel').style.display = 'none';
  displayShoes();
}

function displayShoes() {
  const grid = document.getElementById('shoesGrid');
  const searchInput = document.getElementById('shoeSearch');
  const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
  grid.innerHTML = '';

  const activeWidth    = showUserPref ? (userPref.width    || 'all') : filter.width;
  const activeActivity = showUserPref ? (userPref.purpose  || 'all') : filter.activity;
  const activeGender   = showUserPref ? (userPref.gender   || 'all') : filter.gender;
  const rawSize        = showUserPref ? userPref.size    : filter.size;
  const sizeUnit       = showUserPref ? (userPref.sizeUnit || 'US') : (filter.sizeUnit || 'US');
  const targetUS       = toUSSize(rawSize, sizeUnit);

  let filtered = shoes.filter(s => {
    let sizeMatch = true;
    if(targetUS !== null && Array.isArray(s.sizes) && s.sizes.length > 0) {
      sizeMatch = s.sizes.some(sz => Math.abs(parseFloat(sz) - targetUS) <= 0.5);
    }
    return (
      (activeWidth    === 'all' || s.width    === activeWidth)    &&
      (activeActivity === 'all' || s.category === activeActivity) &&
      (activeGender   === 'all' || s.gender   === activeGender)   &&
      s.name.toLowerCase().includes(searchTerm) &&
      sizeMatch
    );
  });

  filtered.sort((a,b) => {
    if(currentSort === 'alpha-asc')  return a.name.localeCompare(b.name);
    if(currentSort === 'alpha-desc') return b.name.localeCompare(a.name);
    if(currentSort === 'price-asc')  return a.price - b.price;
    if(currentSort === 'price-desc') return b.price - a.price;
    return 0;
  });

  if(filtered.length === 0) {
    grid.innerHTML = `<p style="color:#888;grid-column:1/-1;text-align:center;padding:40px 0;">No shoes match your criteria. Try adjusting your filters.</p>`;
    return;
  }

  filtered.forEach(s => {
    const sizesDisplay = Array.isArray(s.sizes) && s.sizes.length
      ? `<div style="margin-top:6px;font-size:0.78em;color:#666;">Sizes: ${s.sizes.slice(0,6).join(', ')}${s.sizes.length > 6 ? ' …' : ''}</div>`
      : '';

    const genderBadge = s.gender === 'men'
      ? `<div style="position:absolute;top:8px;right:8px;background:rgba(59,130,246,0.85);color:white;font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;">♂ Men</div>`
      : `<div style="position:absolute;top:8px;right:8px;background:rgba(255,20,147,0.4);color:white;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;">♀ Women</div>`;

    const card = document.createElement('div');
    card.className = 'shoe-card';
    card.innerHTML = `
      <div class="shoe-image" style="position:relative;">
        <a href="shoe-detail.html?shoe=${encodeURIComponent(s.name)}">
          <img src="${s.image}" alt="${s.name}" onerror="this.src=''">
        </a>
        ${genderBadge}
      </div>
      <div class="shoe-name">${s.name}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
        <div class="shoe-price">$${s.price}</div>
      </div>
      ${sizesDisplay}
    `;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
