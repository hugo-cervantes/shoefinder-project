<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Details</title> <!-- This doesn't matter because it will be changed -->
<style>
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background: linear-gradient(145deg,#e9eff7 0%,#f6f7fb 55%,#fcf9f3 100%);
  min-height: 100vh;
  margin: 0;
  padding: 0;
  color: #1f2937;
}

.header{
  background:#1f2937;
  color:white;
  padding:20px 60px 18px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  flex-wrap:nowrap;
}
.home-link{
  display:inline-flex;
  flex-direction:column;
  text-decoration:none;
  color:inherit;
  background:transparent;
  border:none;
  padding:0;
  cursor:pointer;
}
.home-link:hover .header-title,
.home-link:focus .header-title{
  opacity:0.94;
}
.home-link:hover .header-subtitle,
.home-link:focus .header-subtitle{
  opacity:0.88;
}
.header h1{font-size:3rem;margin-bottom:2px;}
.header p{color:#cbd5e1;margin-top:2px;font-size:1rem;}
.btn-secondary{
  background:rgba(255,255,255,0.16);
  color:white;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:none;
}
.btn-secondary:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 32px rgba(255,255,255,0.14);
}

.container {
  width: 100%;
  min-height: 100vh;
  background: rgba(255,255,255,0.96);
  padding: 40px 50px 60px;
  border-radius: 0;
  box-shadow: none;
  position: relative;
}

img {
  width: 100%;
  max-height: 420px;
  object-fit: contain;
  border-radius: 18px;
  margin-bottom: 24px;
  box-shadow: 0 18px 40px rgba(15,23,42,0.08);
}

h1 {
  margin-bottom: 12px;
  font-size: 2.8rem;
  letter-spacing: -0.02em;
}

p {
  margin-bottom: 12px;
  line-height: 1.65;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 22px;
  background: linear-gradient(135deg,#5f7dff 0%,#6b4fc6 100%);
  color: white;
  border: none;
  border-radius: 14px;
  text-decoration: none;
  cursor: pointer;
  font-weight: 700;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 14px 30px rgba(95,125,255,0.18);
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 18px 34px rgba(95,125,255,0.24);
}

.review-section {
  margin-top: 40px;
  border-top: 1px solid rgba(15,23,42,0.08);
  padding-top: 30px;
}

.review-section h3 {
  margin-bottom: 16px;
  font-size: 1.2rem;
}

.review-item {
  background: #f8fafc;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(148,163,184,0.2);
}

.star {
  font-size: 24px;
  cursor: pointer;
  color: #ffbf00;
  margin-right: 6px;
}

textarea {
  width: 100%;
  border-radius: 16px;
  border: 1px solid rgba(148,163,184,0.35);
  padding: 14px;
  resize: vertical;
  margin-bottom: 14px;
  min-height: 110px;
  font-family: inherit;
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="home-link">
    <h1 class="header-title">SoleMate</h1>
    <p class="header-subtitle">Find the perfect shoes for your feet</p>
  </a>
  <button class="btn btn-secondary" type="button">Login</button>
</div>

<div class="container">

  <div id="shoeDetail"></div>

  <div class="review-section">
    <h3>Leave a Review</h3>
    <label>Rating:</label><br>
    <div id="starRating">
      <span class="star" data-value="1">☆</span>
      <span class="star" data-value="2">☆</span>
      <span class="star" data-value="3">☆</span>
      <span class="star" data-value="4">☆</span>
      <span class="star" data-value="5">☆</span>
    </div>
    <br>
    <label>Comment:</label><br>
    <textarea id="reviewText" rows="3" placeholder="Write your review..."></textarea>
    <button class="btn" onclick="submitReview()">Submit Review</button>
    <div id="reviewsList" style="margin-top:15px;"></div>
  </div>
</div>

<script>
let shoes = [];
let reviews = {};
let selectedRating = 5;

// Load shoes
async function loadShoes() {
  const res = await fetch('nike-shoes.json');
  shoes = await res.json();
  displayShoeDetail();
}

// Sanitize input
function escapeHtml(text) {
  return text.replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
}

function capitalizeWords(str) {
  return str.replace(/\b\w/g, c => c.toUpperCase());
}

function displayShoeDetail() {
  const params = new URLSearchParams(window.location.search);
  const shoeName = params.get('shoe');

  const shoe = shoes.find(s => s.name === shoeName);
  if(!shoe){
    document.getElementById('shoeDetail').innerHTML = '<p>Shoe not found.</p>';
    return;
  }

  document.title = shoe.name;

  document.getElementById('shoeDetail').innerHTML = `
    <h1>${escapeHtml(shoe.name)}</h1>
    <img src="${escapeHtml(shoe.image)}" alt="${escapeHtml(shoe.name)}">
    <p><strong>Category:</strong> ${capitalizeWords(escapeHtml(shoe.category))}</p>
    <p><strong>Width:</strong> ${capitalizeWords(escapeHtml(shoe.width))}</p>
    <p><strong>Gender:</strong> ${capitalizeWords(escapeHtml(shoe.gender))}</p>
    <p><strong>Price:</strong> $${escapeHtml(shoe.price.toString())}</p>
    <p><a href="${escapeHtml(shoe.link)}" target="_blank" class="btn">Buy Now</a></p>
  `;

  displayReviews(shoe.name);
}

const stars = document.querySelectorAll('#starRating .star');

function updateStars(rating) {
  stars.forEach(star => {
    const val = parseInt(star.dataset.value);
    star.textContent = val <= rating ? '★' : '☆';
  });
}

updateStars(selectedRating);

stars.forEach(star => {
  star.addEventListener('mouseover', () => {
    updateStars(parseInt(star.dataset.value));
  });
  star.addEventListener('mouseout', () => {
    updateStars(selectedRating);
  });
  star.addEventListener('click', () => {
    selectedRating = parseInt(star.dataset.value);
    updateStars(selectedRating);
  });
});

function submitReview() {
  const params = new URLSearchParams(window.location.search);
  const shoeName = params.get('shoe');
  const text = document.getElementById('reviewText').value.trim();

  if(text === "") return alert("Please enter a comment.");

  if(!reviews[shoeName]) reviews[shoeName] = [];
  reviews[shoeName].push({ rating: selectedRating, text: escapeHtml(text) });

  document.getElementById('reviewText').value = "";
  selectedRating = 5;
  updateStars(selectedRating);
  displayReviews(shoeName);
}

function displayReviews(shoeName) {
  const reviewContainer = document.getElementById('reviewsList');
  reviewContainer.innerHTML = "";

  if(!reviews[shoeName] || reviews[shoeName].length === 0) {
    reviewContainer.innerHTML = "<p>No reviews yet.</p>";
    return;
  }

  reviews[shoeName].forEach(r => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `<strong>Anonymous</strong> - ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}<br>${r.text}`;
    reviewContainer.appendChild(div);
  });
}

loadShoes();
</script>

</body>
</html>
